{% extends 'base.html' %}
{% load static %}
{% block title %}Shopvexael | {{ page_title }}{% endblock %}

{% block body %}
<div style="padding: 100px 20px; text-align: center; max-width: 800px; margin: 0 auto;">
    <i class="fas fa-hammer" style="font-size: 5rem; color: var(--accent-gold); margin-bottom: 20px;"></i>
    <h1 style="font-size: 3rem; margin-bottom: 15px;">{{ page_title }}</h1>
    <p style="color: var(--text-secondary); font-size: 1.2rem; margin-bottom: 30px;">
        We are working hard to build this section of the new Shopvexael platform. This feature will be available soon!
    </p>
    <a href="/" class="btn-primary" style="display: inline-block; padding: 15px 30px; text-decoration: none; width: auto;">Return to Home</a>
</div>
{% endblock %}
