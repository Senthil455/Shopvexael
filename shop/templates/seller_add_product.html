{% extends 'base.html' %}
{% load static %}
{% block title %}Shopvexael | Add Product{% endblock %}

{% block body %}
<div style="padding: 40px 20px; max-width: 1000px; margin: 0 auto;">
    <div class="product-card" style="padding: 40px; background: white;">
        <div style="margin-bottom: 30px;">
            <a href="/seller_products/" style="color: var(--text-secondary); text-decoration: none; font-size: 0.9rem;"><i class="fas fa-arrow-left"></i> Back to My Products</a>
            <h1 style="margin: 15px 0 0;">Add New Product</h1>
            <p style="color: var(--text-secondary);">Fill in the details to list your product on Shopvexael.</p>
        </div>

        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div class="form-group">
                    <label>Product Name *</label>
                    <input type="text" name="name" class="form-control" required placeholder="e.g. Sony WH-1000XM4 Headphones">
                </div>
                <div class="form-group">
                    <label>SKU (Unique ID)</label>
                    <input type="text" name="sku" class="form-control" placeholder="e.g. SONY-HP-001">
                </div>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px;">
                <div class="form-group">
                    <label>Category *</label>
                    <select name="category" class="form-control" required>
                        {% for cat in categories %}
                            <option value="{{ cat.id }}">{{ cat.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group">
                    <label>Subcategory</label>
                    <select name="subcategory" class="form-control">
                        <option value="">None</option>
                        {% for sub in subcategories %}
                            <option value="{{ sub.id }}">{{ sub.category.name }} -> {{ sub.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group">
                    <label>Brand *</label>
                    <select name="brand" class="form-control" required>
                        {% for brand in brands %}
                            <option value="{{ brand.id }}">{{ brand.name }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label>Short Description (Quick Summary) *</label>
                <input type="text" name="short_description" class="form-control" required placeholder="Briefly describe your product in 1 sentence.">
            </div>

            <div class="form-group">
                <label>Full Description *</label>
                <textarea name="description" class="form-control" rows="6" required placeholder="Detailed information about the product..."></textarea>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px;">
                <div class="form-group">
                    <label>Base Price (₹) *</label>
                    <input type="number" step="0.01" name="price" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Discount Price (Optional)</label>
                    <input type="number" step="0.01" name="discount_price" class="form-control">
                </div>
                <div class="form-group">
                    <label>Stock Quantity *</label>
                    <input type="number" name="stock" class="form-control" required value="0">
                </div>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div class="form-group">
                    <label>Main Product Image</label>
                    <input type="file" name="image" class="form-control-file" style="padding: 10px; border: 1px dashed var(--border-color); border-radius: 5px; width: 100%;">
                </div>
                <div class="form-group">
                    <label>Tags (Comma separated)</label>
                    <input type="text" name="tags" class="form-control" placeholder="electronics, gadget, audio">
                </div>
            </div>

            <div style="margin-top: 30px; display: flex; gap: 20px;">
                <button type="submit" class="btn-primary" style="flex: 2; padding: 15px; font-size: 1.1rem;">Create Product</button>
                <a href="/seller_products/" class="btn-primary" style="flex: 1; padding: 15px; font-size: 1.1rem; background: transparent; border: 1px solid var(--border-color); color: var(--text-primary); text-decoration: none; text-align: center;">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
