{% extends 'base.html' %}
{% load static %}
{% block title %}Shopvexael | Login{% endblock %}

{% block body %}
<div class="auth-container">
    <h2 style="text-align: center; margin-bottom: 30px;">Welcome Back!</h2>
    
    {% if alert %}
    <div style="background: rgba(239, 68, 68, 0.1); color: var(--accent-red); padding: 10px; border-radius: 4px; margin-bottom: 20px; text-align: center; border: 1px solid var(--accent-red);">
        Username or Password is incorrect.
    </div>
    {% endif %}

    <form method="POST"> 
        {% csrf_token %}
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" class="form-control" id="username" name="username" placeholder="Enter Username" required>
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" class="form-control" id="password" name="password" placeholder="Enter Password" required>
        </div>
        
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <div>
                <input type="checkbox" id="remember"> <label for="remember" style="display: inline;">Remember me</label>
            </div>
            <a href="#" style="color: var(--accent-gold); text-decoration: none; font-size: 0.9rem;">Forget password?</a>
        </div>

        <button type="submit" class="btn-primary" style="width: 100%; font-size: 1.1rem;">Sign In</button>
    </form>
    
    <div style="text-align: center; margin-top: 20px; font-size: 0.9rem;">
        Don't have an account? <a href="/register/" style="color: var(--accent-gold); text-decoration: none;">Sign up</a>
    </div>
</div>
{% endblock %}
